name: Deploy (o2switch)
on:
  workflow_dispatch: {}
  push: { tags: ["v*"] }
# Build en CI (jamais sur le mutualisé), déploiement par rsync, migrations en étape dédiée (AD-18, AD-24).
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run generate:client build
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.O2SWITCH_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.O2SWITCH_HOST }}" >> ~/.ssh/known_hosts
      - name: Rsync API
        run: rsync -az --delete apps/api/dist apps/api/app.js apps/api/package.json "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:~/api/"
      - name: Rsync Web
        run: rsync -az --delete apps/web/.output "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:~/web/"
      - name: Migrations (AD-18 — jamais au boot)
        run: ssh "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}" 'cd ~/api && npm ci --omit=dev && node_modules/.bin/mikro-orm migration:up'
      - name: Restart Passenger
        run: ssh "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}" 'mkdir -p ~/api/tmp ~/web/tmp && touch ~/api/tmp/restart.txt ~/web/tmp/restart.txt'
