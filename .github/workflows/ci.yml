name: CI
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run build lint test
      # Anti-drift du contrat (AD-12) : régénère le client et échoue si le commit diverge de l'OpenAPI courant.
      - run: pnpm exec turbo run generate:client
      - name: Vérifier l'absence de drift du contrat
        run: git diff --exit-code packages/contracts/src/generated
