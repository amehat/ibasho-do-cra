name: CI
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: cra
          MARIADB_USER: cra
          MARIADB_PASSWORD: crapwd
        ports: ["3306:3306"]
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=20
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_NAME: cra
      DB_USER: cra
      DB_PASSWORD: crapwd
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run build lint test
      # Anti-drift du contrat (AD-12)
      - run: pnpm exec turbo run generate:client
      - name: Vérifier l'absence de drift du contrat
        run: git diff --exit-code packages/contracts/src/generated
      # Migrations + e2e auth contre MariaDB (AD-18)
      - run: pnpm db:migrate
      - run: pnpm --filter @cra/api test:e2e
